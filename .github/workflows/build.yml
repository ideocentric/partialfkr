name: CI

on:
  push:
    branches: [master]
  pull_request:

jobs:
  # ── macOS ─────────────────────────────────────────────────────────────────────
  # Produces a single universal binary (arm64 + x86_64) via -DCMAKE_OSX_ARCHITECTURES.
  build-macos:
    name: macOS (universal)
    runs-on: macos-14

    steps:
      - uses: actions/checkout@v4

      - name: Cache build dependencies
        uses: actions/cache@v4
        with:
          path: build/_deps
          key: macos-deps-${{ hashFiles('CMakeLists.txt') }}
          restore-keys: macos-deps-

      - name: Configure
        run: |
          cmake -B build -G Ninja \
            -DCMAKE_BUILD_TYPE=Release \
            -DCMAKE_OSX_ARCHITECTURES="arm64;x86_64"

      - name: Build
        run: cmake --build build --parallel

      - name: Upload artifact
        uses: actions/upload-artifact@v4
        with:
          name: PartialFKR-macOS-universal
          path: build/PartialFKR.app

  # ── Linux ─────────────────────────────────────────────────────────────────────
  # Two native runners: one x86_64, one arm64. Same steps, different runner.
  build-linux:
    strategy:
      fail-fast: false
      matrix:
        include:
          - runner: ubuntu-22.04
            arch: x86_64
          - runner: ubuntu-22.04-arm
            arch: arm64

    name: Linux ${{ matrix.arch }}
    runs-on: ${{ matrix.runner }}

    steps:
      - uses: actions/checkout@v4

      - name: Install JUCE system dependencies
        run: |
          sudo apt-get update
          sudo apt-get install -y \
            ninja-build \
            libasound2-dev \
            libx11-dev \
            libxinerama-dev \
            libxrandr-dev \
            libxcursor-dev \
            libxext-dev \
            libfreetype6-dev \
            libfontconfig1-dev \
            libglu1-mesa-dev \
            libgl1-mesa-dev \
            mesa-common-dev \
            libgtk-3-dev

      - name: Cache build dependencies
        uses: actions/cache@v4
        with:
          path: build/_deps
          key: linux-${{ matrix.arch }}-deps-${{ hashFiles('CMakeLists.txt') }}
          restore-keys: linux-${{ matrix.arch }}-deps-

      - name: Configure
        run: cmake -B build -G Ninja -DCMAKE_BUILD_TYPE=Release

      - name: Build
        run: cmake --build build --parallel

      - name: Upload artifact
        uses: actions/upload-artifact@v4
        with:
          name: PartialFKR-Linux-${{ matrix.arch }}
          path: build/PartialFKR

  # ── Windows ───────────────────────────────────────────────────────────────────
  # Uses the Visual Studio generator so MSVC environment setup is automatic.
  # windows-11-arm provides a native ARM64 host; -A ARM64 targets it directly.
  build-windows:
    strategy:
      fail-fast: false
      matrix:
        include:
          - runner: windows-latest
            arch: x64
            name: x86_64
          - runner: windows-11-arm
            arch: ARM64
            name: arm64

    name: Windows ${{ matrix.name }}
    runs-on: ${{ matrix.runner }}

    steps:
      - uses: actions/checkout@v4

      - name: Cache build dependencies
        uses: actions/cache@v4
        with:
          path: build/_deps
          key: windows-${{ matrix.name }}-deps-${{ hashFiles('CMakeLists.txt') }}
          restore-keys: windows-${{ matrix.name }}-deps-

      - name: Configure
        run: cmake -B build -G "Visual Studio 17 2022" -A ${{ matrix.arch }}

      - name: Build
        run: cmake --build build --config Release --parallel

      - name: Upload artifact
        uses: actions/upload-artifact@v4
        with:
          name: PartialFKR-Windows-${{ matrix.name }}
          path: build/Release/PartialFKR.exe