name: CI

on:
  push:
    branches: [master]
  pull_request:

# ── Artifact note ──────────────────────────────────────────────────────────────
# CI artifacts are for contributor testing only — they are NOT distribution builds.
#
#   macOS   — unsigned, unnotarized DMG. Verifies the build and DMG layout.
#             For a distributable release use scripts/distribute.sh locally.
#
#   Linux   — signed .deb and .rpm packages. These ARE ready for distribution.
#
#   Windows — unsigned NSIS installer. Verifies the packaging flow only.
#             For a distributable release, sign with signtool after obtaining
#             an Authenticode certificate (see docs/DISTRIBUTION.md).

jobs:
  # ── macOS ─────────────────────────────────────────────────────────────────────
  # Produces a universal binary (arm64 + x86_64) and verifies the DMG layout.
  # The artifact is unsigned and unnotarized — not for end-user distribution.
  # For a signed, notarized release DMG run scripts/distribute.sh locally
  # with a configured .env (see .env.example).
  build-macos:
    name: macOS (universal)
    runs-on: macos-14

    steps:
      - uses: actions/checkout@v4

      - name: Cache build dependencies
        uses: actions/cache@v4
        with:
          path: build/_deps
          key: macos-deps-${{ hashFiles('CMakeLists.txt') }}
          restore-keys: macos-deps-

      - name: Configure
        run: |
          cmake -B build -G Ninja \
            -DCMAKE_BUILD_TYPE=Release \
            -DCMAKE_OSX_ARCHITECTURES="arm64;x86_64"

      - name: Build
        run: cmake --build build --parallel

      - name: Install dmgbuild
        run: pip3 install --break-system-packages dmgbuild

      - name: Package
        run: cmake --build build --target dmg

      - name: Upload (unsigned — not for distribution)
        uses: actions/upload-artifact@v4
        with:
          name: PartialFKR-macOS-CI-unsigned
          path: build/PartialFKR-*.dmg
          if-no-files-found: error

  # ── Linux ─────────────────────────────────────────────────────────────────────
  # Two native runners (x86_64 + arm64). Each produces a .deb and .rpm via CPack.
  # These artifacts ARE suitable for distribution.
  build-linux:
    strategy:
      fail-fast: false
      matrix:
        include:
          - runner: ubuntu-22.04
            arch: x86_64
          - runner: ubuntu-22.04-arm
            arch: arm64

    name: Linux ${{ matrix.arch }}
    runs-on: ${{ matrix.runner }}

    steps:
      - uses: actions/checkout@v4

      - name: Install dependencies
        run: |
          sudo apt-get update
          sudo apt-get install -y \
            ninja-build \
            rpm \
            libasound2-dev \
            libx11-dev \
            libxinerama-dev \
            libxrandr-dev \
            libxcursor-dev \
            libxext-dev \
            libfreetype6-dev \
            libfontconfig1-dev \
            libglu1-mesa-dev \
            libgl1-mesa-dev \
            mesa-common-dev \
            libgtk-3-dev

      - name: Cache build dependencies
        uses: actions/cache@v4
        with:
          path: build/_deps
          key: linux-${{ matrix.arch }}-deps-${{ hashFiles('CMakeLists.txt') }}
          restore-keys: linux-${{ matrix.arch }}-deps-

      - name: Configure
        run: cmake -B build -G Ninja -DCMAKE_BUILD_TYPE=Release

      - name: Build
        run: cmake --build build --parallel

      - name: Package
        working-directory: build
        run: cpack

      - name: Upload
        uses: actions/upload-artifact@v4
        with:
          name: PartialFKR-Linux-${{ matrix.arch }}-packages
          path: |
            build/PartialFKR-*.deb
            build/PartialFKR-*.rpm
          if-no-files-found: error

  # ── Windows ───────────────────────────────────────────────────────────────────
  # Uses the Visual Studio generator. Each arch produces an NSIS .exe installer.
  # The artifact is unsigned — not for end-user distribution.
  # For a signed release installer, sign with signtool.exe after acquiring an
  # Authenticode certificate (see docs/DISTRIBUTION.md § Windows).
  build-windows:
    strategy:
      fail-fast: false
      matrix:
        include:
          - runner: windows-latest
            arch: x64
            name: x86_64
          - runner: windows-11-arm
            arch: ARM64
            name: arm64

    name: Windows ${{ matrix.name }}
    runs-on: ${{ matrix.runner }}

    steps:
      - uses: actions/checkout@v4

      - name: Cache build dependencies
        uses: actions/cache@v4
        with:
          path: build/_deps
          key: windows-${{ matrix.name }}-deps-${{ hashFiles('CMakeLists.txt') }}
          restore-keys: windows-${{ matrix.name }}-deps-

      - name: Configure
        run: cmake -B build -G "Visual Studio 17 2022" -A ${{ matrix.arch }}

      - name: Build
        run: cmake --build build --config Release --parallel

      - name: Install NSIS
        run: choco install nsis -y

      - name: Package
        working-directory: build
        run: cpack -C Release

      - name: Show NSIS log on failure
        if: failure()
        run: |
          $log = Get-ChildItem -Recurse -Filter NSISOutput.log build | Select-Object -First 1
          if ($log) { Get-Content $log.FullName } else { Write-Host "NSISOutput.log not found" }
        shell: pwsh

      - name: Upload (unsigned — not for distribution)
        uses: actions/upload-artifact@v4
        with:
          name: PartialFKR-Windows-${{ matrix.name }}-CI-unsigned
          path: build/PartialFKR-*.exe
          if-no-files-found: error